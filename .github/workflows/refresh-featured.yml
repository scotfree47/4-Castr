name: Refresh Featured Tickers

on:
  schedule:
    - cron: '0 2 * * *'  # 4 AM UTC daily
  workflow_dispatch:     # Allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cron Endpoint
        run: |
          curl -X GET https://your-vercel-app.vercel.app/api/cron-refresh-featured \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f  # Fail on HTTP errors

      - name: Report Status
        if: failure()
        run: echo "Failed to refresh featured tickers"
